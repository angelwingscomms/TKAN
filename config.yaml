# Symbol
symbol: "BTCUSD"

# Symbol
target_type: "atr"
atr_multiplier: 2.0
tp_multiplier: 2.0
atr_period: 9

# Data
data_path: "1m"
timeframe_minutes: 60
sequence_length: 45
n_ahead: 9
feature_symbols:
  BCHUSD: false
  BTCUSD: true
  ETHUSD: true
  LTCUSD: true
  XRPUSD: true
  ADAUSD: false
  AVAXUSD: false
  AXSUSD: false
  DOGEUSD: true
  DOTUSD: false
  EOSUSD: false
  FILUSD: false
  LINKUSD: false
  MATICUSD: false
  MIOTAUSD: false
  SOLUSD: true
  TRXUSD: true
  UNIUSD: false
  XLMUSD: false

# Labels
threshold_pct: 1.0
stop_loss_pct: 0.5

# Model
hidden_size: 100
sub_dim: 20

# Training
batch_size: 256
learning_rate: 0.01
epochs: 9
train_test_split: 0.8
seed: 42

# Output
model_output: "model.onnx"
norm_output: "norm_params.mqh"
