# Data
data_path: "examples/data.parquet"
timeframe_minutes: 60
sequence_length: 45
n_ahead: 9
assets: [BTC, ETH, ADA, EOS, MATIC, TRX, XLM, LINK, BCH, LTC]
start_date: "2020-01-01"
end_date: "2023-01-01"

# Labels
threshold_pct: 1.0
stop_loss_pct: 0.5

# Model
hidden_size: 100
sub_dim: 20

# Training
batch_size: 256
learning_rate: 0.001
epochs: 27
train_test_split: 0.8
seed: 42

# Output
model_output: "model.onnx"
norm_output: "norm_params.csv"
